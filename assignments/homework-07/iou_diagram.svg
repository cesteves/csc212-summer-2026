<svg xmlns="http://www.w3.org/2000/svg" width="400" height="152" font-family="monospace" font-size="11">
  <defs>
    <pattern id="hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#555" stroke-width="1.2"/>
    </pattern>
  </defs>

  <!-- Box A -->
  <rect x="20" y="35" width="125" height="88" fill="#dde8ff" stroke="#4363d8" stroke-width="2"/>
  <text x="82" y="28" text-anchor="middle" fill="#4363d8" font-weight="bold">Box A</text>

  <!-- Box B -->
  <rect x="98" y="55" width="125" height="88" fill="#ffe8cc" stroke="#f58231" stroke-width="2"/>
  <text x="160" y="48" text-anchor="middle" fill="#f58231" font-weight="bold">Box B</text>

  <!-- Intersection hatched overlay (x=98..145, y=55..123) -->
  <rect x="98" y="55" width="47" height="68" fill="url(#hatch)" opacity="0.75"/>

  <!-- Arrow -->
  <line x1="242" y1="88" x2="270" y2="88" stroke="#444" stroke-width="2"/>
  <polygon points="270,84 278,88 270,92" fill="#444"/>

  <!-- Isolated intersection (right panel) -->
  <text x="305" y="48" text-anchor="middle" fill="#555" font-size="10">Intersection</text>
  <rect x="282" y="55" width="47" height="68" fill="url(#hatch)" opacity="0.75"/>
  <rect x="282" y="55" width="47" height="68" fill="none" stroke="#555" stroke-width="1.5"/>

</svg>
